# Telemt MTProto Proxy monitoring for Zabbix Agent 2
# Install: cp telemt.conf /etc/zabbix/zabbix_agent2.d/telemt.conf

# Health check: 1 = ok, 0 = down
UserParameter=telemt.health,/opt/teleproxy/telemt-ctl zabbix health

# Total number of configured users
UserParameter=telemt.users.count,/opt/teleproxy/telemt-ctl zabbix users.count

# Total connections across all users
UserParameter=telemt.conns.total,/opt/teleproxy/telemt-ctl zabbix conns

# Total bytes transferred across all users
UserParameter=telemt.octets.total,/opt/teleproxy/telemt-ctl zabbix octets

# Total active unique IPs across all users
UserParameter=telemt.ips.total,/opt/teleproxy/telemt-ctl zabbix ips

# --- Per-user LLD (Low-Level Discovery) ---
UserParameter=telemt.user.discovery,/opt/teleproxy/telemt-ctl zabbix discovery

# Per-user metrics (use with LLD macros)
UserParameter=telemt.user.conns[*],/opt/teleproxy/telemt-ctl zabbix conns "$1"
UserParameter=telemt.user.octets[*],/opt/teleproxy/telemt-ctl zabbix octets "$1"
UserParameter=telemt.user.ips[*],/opt/teleproxy/telemt-ctl zabbix ips "$1"
